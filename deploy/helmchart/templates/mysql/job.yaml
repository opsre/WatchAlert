apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "watchalert.componentName" (dict "root" . "component" "init-job") }}
  namespace: {{ .Release.Namespace }}
spec:
  template:
    spec:
      {{- with .Values.job.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.job.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-service
          image: {{ .Values.initContainers.wait.image.repository }}:{{ .Values.initContainers.wait.image.tag }}
          command:
            - sh
            - -c
            - until nc -z -v -w 30 {{ include "watchalert.componentName" (dict "root" . "component" "service") }} 9001; do echo "Waiting for service..."; sleep 3; done;

      containers:
        - name: {{ include "watchalert.componentName" (dict "root" . "component" "init-job") }}
          image: {{ include "watchalert.job.mysql.image" . }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: MYSQL_HOST
              value: {{ include "watchalert.database.host" . | quote }}
            - name: MYSQL_PORT
              value: {{ include "watchalert.database.port" . | quote }}
            - name: MYSQL_USERNAME
              value: {{ include "watchalert.database.user" . | quote }}
            - name: MYSQL_PASSWORD
              value: {{ include "watchalert.database.password" . | quote }}
            - name: MYSQL_DATABASE
              value: {{ include "watchalert.database.name" . | quote }}
          volumeMounts:
            - name: config
              mountPath: /sql

          command: ["sh", "-c", "sh /sql/auto_import.sh"]
      volumes:
        - name: config
          configMap:
            name: {{ include "watchalert.componentName" (dict "root" . "component" "init-config") }}
      restartPolicy: OnFailure