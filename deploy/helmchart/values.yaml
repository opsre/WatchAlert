# Default values for watchalert.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

imagePullSecrets: []
imagePullPolicy: IfNotPresent

service:
  image:
    repository: docker.1ms.run/cairry/watchalert
    tag: "latest"

  resources:
    requests:
      memory: 50Mi
      cpu: 50m
    limits:
      memory: 1Gi
      cpu: 1

  config: |-
    Server:
      port: "9001"
      mode: "release"

    DATABASE:
      type: mysql
      host: {{ include "watchalert.database.host" . }}
      port: {{ include "watchalert.database.port" . }}
      user: {{ include "watchalert.database.user" . }}
      pass: {{ include "watchalert.database.password" . }}
      dbName: {{ include "watchalert.database.name" . }}
      timeout: 10s

    Redis:
      host: {{ include "watchalert.redis.host" . }}
      port: {{ include "watchalert.redis.port" . }}
      pass: {{ include "watchalert.redis.password" . }}
      database: {{ include "watchalert.redis.database" . }}
    
    Jwt:
      expire: 18000
    
    Ldap:
      enabled: false
      address: "192.168.1.100:399"
      baseDN: "dc=test,dc=com"
      adminUser: "cn=admin,dc=test,dc=com"
      adminPass: "test123."
      userDN: "ou=people,dc=test,dc=com"
      userPrefix: "uid"
      defaultUserRole: "ur-cq7nkj1d6gviooaigqi0"
      cronjob: "*/1 * * * *"

  nodeSelector: {}

  tolerations: []

  livenessProbe:
    httpGet:
      path: /hello
      port: 9001
    initialDelaySeconds: 10
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /hello
      port: 9001
    initialDelaySeconds: 5
    periodSeconds: 10

web:
  image:
    repository: docker.1ms.run/cairry/watchalert-web
    tag: "latest"

  resources:
    requests:
      memory: 50Mi
      cpu: 50m
    limits:
      memory: 1Gi
      cpu: 1

  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 10
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 10

  nodeSelector: {}

  tolerations: []

  config: |-
    server {
      listen 80;
    
      root /app;
      index index.html index.htm;
    
      location / {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
        try_files $uri $uri/ /index.html;
      }
    
      location /api {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
        proxy_connect_timeout 300;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_request_buffering off;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2;
        proxy_pass http://{{ include "watchalert.componentName" (dict "root" . "component" "service") }}:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_body $request_body;
        proxy_pass_request_headers on;
      }
    
      error_page 500 502 503 504 /500.html;
    
      client_max_body_size 2050m;
      client_body_buffer_size 1024k;
    
      keepalive_timeout 10;
    }

  service:
    type: NodePort
#    nodePort: 30080

  ingress:
    enabled: false
    className: ""
    annotations:
      kubernetes.io/ingress.class: nginx
      # cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: watchalert.x.com
        paths:
          - path: /
            pathType: ImplementationSpecific
            # Optional: Override backend service (defaults to web component on port 80)
            serviceName: ""  # e.g., "watchalert-service" to route to backend API
            servicePort: ""  # e.g., 9001 for backend API, 18102 for custom service
    tls: []
    # Example TLS configuration:
    # tls:
    #   - hosts:
    #       - watchalert.x.com
    #     secretName: watchalert-tls

serviceAccount:
  create: false
  annotations: {}
  name: ""

# MySQL initialization job configuration
# Note: The job automatically selects the appropriate MySQL client image:
# - Internal MySQL: Uses mysql.image for version consistency with the StatefulSet
# - External MySQL: Uses job.image for flexibility to match external server version
job:
  image:
    repository: docker.1ms.run/mysql
    tag: "8.0"

  nodeSelector: {}

  tolerations: []

# Internal MySQL deployment
mysql:
  enabled: true
  image:
    repository: docker.1ms.run/mysql
    tag: "8.0"
  auth:
    rootPassword: w8t.123
    database: watchalert
  persistence:
    enabled: false
    storageClass: "hostpath"
    accessMode: ReadWriteOnce
    size: 5Gi

  nodeSelector: {}

  tolerations: []

# Internal Redis deployment
redis:
  enabled: true
  image:
    repository: docker.1ms.run/redis
    tag: "latest"
  persistence:
    enabled: false
    storageClass: "hostpath"
    accessMode: ReadWriteOnce
    size: 1Gi

  nodeSelector: {}

  tolerations: []

# External database configuration
externalDatabase:
  enabled: false  # Set to true to use external databases instead of internal StatefulSets
  mysql:
    host: ""
    port: 3306
    user: root
    password: ""
    database: watchalert
  redis:
    host: ""
    port: 6379
    password: ""
    database: 0

initContainers:
  wait:
    image:
      repository: docker.1ms.run/busybox
      tag: "1.36.1"
